services:
  keycloak:
    build:
      context: ./docker/keycloak
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak/themes:/opt/keycloak/themes
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

  web:
    build: .
    command: bash -c "poetry lock && poetry install &&
                      poetry run python manage.py compilemessages --ignore \".venv\" &&
                      poetry run python manage.py runserver_plus 0.0.0.0:8000 --reloader-type=stat"
    volumes:
      - .:/app
    environment:
      VIRTUAL_HOST: localhost
      DEBUG: 1
      DJANGO_VITE_DEBUG: True
    depends_on:
      - db
      - keycloak
      - redis
    ports:
      - "8000:8000"

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=tapir
      - POSTGRES_PASSWORD=tapir
      - POSTGRES_USER=tapir
    ports:
      - '5432:5432'

  # Backend for Celery task queue
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "poetry install &&
                      poetry run celery -A tapir worker -l info"
    volumes:
      - .:/app
    environment:
      DEBUG: 1
    depends_on:
      - redis
      - db

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    # --schedule to avoid polluting the app directory
    command: bash -c "poetry install &&
                      poetry run celery -A tapir beat -l info --schedule /tmp/celerybeat-schedule"
    volumes:
      - .:/app
    environment:
      DEBUG: 1
    depends_on:
      - redis
      - celery

  db-admin:
    image: adminer
    ports:
      - "8280:8080"

  vite:
    build:
      context: .
      dockerfile: ./vite.Dockerfile
    tty: true
    ports:
      - '5173:5173'
    volumes:
      - .:/app

volumes:
  nginx-certs-volume:
