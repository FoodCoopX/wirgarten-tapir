default_language_version:
  python: python3.14
repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/rtts/djhtml
    rev: '3.0.11'
    hooks:
      - id: djhtml
      - id: djcss
      - id: djjs
  - repo: https://github.com/adamchainz/django-upgrade
    rev: "1.30.0"
    hooks:
      - id: django-upgrade